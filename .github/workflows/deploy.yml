name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and Build
        run: |
          # Om det finns en frontend-mapp, gå in i den, annars stanna här
          [ -d "frontend" ] && cd frontend || echo "Stannar i huvudmappen"
          npm install --force
          CI=false npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Den här letar efter både 'build' och 'dist' var de än ligger
          path: |
            **/build
            **/dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
